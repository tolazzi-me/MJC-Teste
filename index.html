<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Meus Imóveis - Curitiba</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          #0a0a0a 0%,
          #1a1a2e 40%,
          #a8c6e5 100%
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
      }

      header {
        text-align: center;
        color: #fff;
        margin-bottom: 35px;
      }
      header h1 {
        font-size: 2.2rem;
        letter-spacing: 1px;
      }
      header p {
        color: #cfe0f0;
        font-size: 0.95rem;
        margin-top: 6px;
      }

      .resumo {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        padding: 22px 26px;
        color: #fff;
        min-width: 180px;
        text-align: center;
      }
      .resumo .glass-card h3 {
        font-size: 0.85rem;
        color: #b8d4f0;
        font-weight: 400;
      }
      .resumo .glass-card span {
        display: block;
        font-size: 1.6rem;
        font-weight: 600;
        margin-top: 8px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 26px;
        width: 100%;
        max-width: 1100px;
      }

      .apto-card {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(168, 198, 229, 0.35);
        border-radius: 20px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.15);
        padding: 24px;
        color: #fff;
        position: relative;
        overflow: hidden;
        transition: transform 0.3s ease;
      }
      .apto-card:hover {
        transform: translateY(-6px);
      }

      .apto-card::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at top left,
          rgba(168, 198, 229, 0.15),
          transparent 60%
        );
        pointer-events: none;
      }

      .apto-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .apto-header h2 {
        font-size: 1.3rem;
      }
      .apto-header .num {
        color: #a8c6e5;
        font-size: 0.85rem;
      }

      .status {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .status.lucro {
        background: rgba(120, 220, 160, 0.2);
        color: #7de6a3;
        border: 1px solid rgba(125, 230, 163, 0.4);
      }
      .status.prejuizo {
        background: rgba(230, 90, 90, 0.2);
        color: #f28b8b;
        border: 1px solid rgba(242, 139, 139, 0.4);
      }

      .info-linha {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 0.92rem;
      }
      .info-linha:last-of-type {
        border-bottom: none;
      }
      .info-linha .label {
        color: #cfe0f0;
      }
      .info-linha .valor {
        font-weight: 600;
      }

      .saldo-box {
        margin-top: 16px;
        padding: 14px;
        border-radius: 14px;
        text-align: center;
        background: rgba(255, 255, 255, 0.06);
      }
      .saldo-box .saldo-valor {
        font-size: 1.4rem;
        font-weight: 700;
        margin-top: 4px;
      }
      .lucro-txt {
        color: #7de6a3;
      }
      .prejuizo-txt {
        color: #f28b8b;
      }

      footer {
        margin-top: 40px;
        color: #b8d4f0;
        font-size: 0.8rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🏢 MJC — Painel do Proprietário 🏢</h1>
      <p>Acompanhamento financeiro dos 4 apartamentos alugados</p>
    </header>

    <div class="resumo">
      <div class="glass-card">
        <h3>Receita Total</h3>
        <span id="totalReceita">R$ 0,00</span>
      </div>
      <div class="glass-card">
        <h3>Despesas Totais</h3>
        <span id="totalDespesa">R$ 0,00</span>
      </div>
      <div class="glass-card">
        <h3>Saldo Geral</h3>
        <span id="totalSaldo">R$ 0,00</span>
      </div>
    </div>

    <div class="grid" id="grid"></div>

    <footer>
      Edifício único • Curitiba, PR &mdash; Dados atualizados manualmente
    </footer>

    <script>
      const apartamentos = [
        {
          nome: "Apto 101",
          inquilino: "Maria Souza",
          aluguel: 1800,
          condominio: 350,
          iptu: 60,
          manutencao: 40,
        },
        {
          nome: "Apto 202",
          inquilino: "João Pedro",
          aluguel: 1600,
          condominio: 350,
          iptu: 60,
          manutencao: 120,
        },
        {
          nome: "Apto 303",
          inquilino: "Ana Lima",
          aluguel: 2000,
          condominio: 380,
          iptu: 65,
          manutencao: 30,
        },
        {
          nome: "Apto 404",
          inquilino: "Carlos Dias",
          aluguel: 1500,
          condominio: 350,
          iptu: 60,
          manutencao: 250,
        },
      ];

      const grid = document.getElementById("grid");
      let totalReceita = 0,
        totalDespesa = 0;

      apartamentos.forEach((a, i) => {
        const despesas = a.condominio + a.iptu + a.manutencao;
        const saldo = a.aluguel - despesas;
        const positivo = saldo >= 0;

        totalReceita += a.aluguel;
        totalDespesa += despesas;

        const card = document.createElement("div");
        card.className = "apto-card";
        card.innerHTML = `
      <div class="apto-header">
        <div>
          <h2>${a.nome}</h2>
          <div class="num">Inquilino: ${a.inquilino}</div>
        </div>
        <span class="status ${positivo ? "lucro" : "prejuizo"}">
          ${positivo ? "LUCRO" : "PREJUÍZO"}
        </span>
      </div>

      <div class="info-linha"><span class="label">Aluguel recebido</span><span class="valor">R$ ${a.aluguel.toFixed(2)}</span></div>
      <div class="info-linha"><span class="label">Condomínio</span><span class="valor">R$ ${a.condominio.toFixed(2)}</span></div>
      <div class="info-linha"><span class="label">IPTU</span><span class="valor">R$ ${a.iptu.toFixed(2)}</span></div>
      <div class="info-linha"><span class="label">Manutenção</span><span class="valor">R$ ${a.manutencao.toFixed(2)}</span></div>

      <div class="saldo-box">
        <div class="label">Saldo do mês</div>
        <div class="saldo-valor ${positivo ? "lucro-txt" : "prejuizo-txt"}">
          ${positivo ? "+" : ""} R$ ${saldo.toFixed(2)}
        </div>
      </div>
    `;
        grid.appendChild(card);
      });

      const saldoGeral = totalReceita - totalDespesa;
      document.getElementById("totalReceita").textContent =
        `R$ ${totalReceita.toFixed(2)}`;
      document.getElementById("totalDespesa").textContent =
        `R$ ${totalDespesa.toFixed(2)}`;
      const saldoEl = document.getElementById("totalSaldo");
      saldoEl.textContent = `R$ ${saldoGeral.toFixed(2)}`;
      saldoEl.style.color = saldoGeral >= 0 ? "#7de6a3" : "#f28b8b";
    </script>
  </body>
</html>
